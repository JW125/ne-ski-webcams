<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northeast Ski Webcams & Snow Forecast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
header{text-align:center;padding:28px 20px 16px;border-bottom:1px solid #21262d}
header h1{font-size:1.8rem;font-weight:700;letter-spacing:-0.5px}
header h1 span.accent{background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#8b949e;margin-top:6px;font-size:0.85rem}
.header-actions{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:10px;margin-top:12px}
.refresh-label{display:flex;align-items:center;gap:6px;font-size:.82rem;color:#8b949e}
.refresh-label select{font:inherit;padding:4px 8px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;cursor:pointer}
.refresh-label select:hover{border-color:#58a6ff}
.btn-refresh{font:inherit;padding:5px 14px;background:rgba(88,166,255,.12);border:1px solid #58a6ff;border-radius:8px;color:#58a6ff;cursor:pointer;font-weight:600;font-size:.82rem;transition:all .15s}
.btn-refresh:hover{background:#58a6ff;color:#0d1117}
#updated{color:#484f58;font-size:0.72rem;margin-top:6px}
.controls{text-align:center;padding:10px 20px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.filter-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:0.78rem;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:#30363d;color:#e6edf3;border-color:#58a6ff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px;padding:20px;max-width:1800px;margin:0 auto}
@media(max-width:480px){.grid{grid-template-columns:1fr;padding:12px}}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#1c2128;border-bottom:1px solid #30363d}
.card-head h3{font-size:.92rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-head .meta{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.badge{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:700}
.provider{font-size:.62rem;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.06);color:#8b949e;font-family:monospace}
.VT{background:#238636;color:#fff}.NH{background:#1f6feb;color:#fff}.ME{background:#da3633;color:#fff}.NY{background:#8957e5;color:#fff}.CT{background:#f78166;color:#000}
/* Webcam feed */
.cam-feed{position:relative;aspect-ratio:16/10;background:#0d1117;overflow:hidden}
.cam-feed img{display:block;width:100%;height:100%;object-fit:cover;background:#111}
.cam-feed iframe{display:block;width:100%;height:100%;border:none}
.cam-feed .placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#131a27 0%,#0d1117 100%);color:#484f58;font-size:.85rem;gap:8px}
.cam-feed .placeholder.error{color:#f85149}
.cam-feed .placeholder a{color:#58a6ff;text-decoration:none;font-size:.78rem;padding:6px 16px;border:1px solid rgba(88,166,255,.3);border-radius:6px;transition:all .2s}
.cam-feed .placeholder a:hover{background:rgba(88,166,255,.15)}
/* Temp overlay on webcam */
.temp-overlay{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;padding:6px 10px;background:linear-gradient(transparent,rgba(0,0,0,.8));z-index:2;pointer-events:none}
.temp-pill{font-weight:600;padding:3px 8px;border-radius:6px;backdrop-filter:blur(4px);display:flex;align-items:center;gap:4px;font-size:.7rem}
.temp-pill.base{background:rgba(56,139,253,.3);color:#79c0ff}
.temp-pill.summit{background:rgba(188,140,255,.3);color:#d2a8ff}
.temp-pill .lbl{font-size:.55rem;opacity:.85;text-transform:uppercase;letter-spacing:.3px}
.temp-pill .deg{font-size:.88rem;font-weight:700}
.cam-updated{padding:3px 14px;font-size:.65rem;color:#484f58;font-family:monospace;border-top:1px solid #21262d}
/* Forecast strip */
.forecast-strip{display:flex;border-top:1px solid #30363d}
.fday{flex:1;padding:6px 2px 5px;text-align:center;border-right:1px solid #21262d;position:relative}
.fday:last-child{border-right:none}
.fday.today{background:rgba(56,139,253,.08)}
.fday .dt{font-size:.6rem;color:#8b949e;text-transform:uppercase;line-height:1.3}
.fday .temps{font-size:.68rem;margin:2px 0;font-weight:600}
.fday .temps .hi{color:#f0883e}.fday .temps .lo{color:#8b949e}
.fday .precip-row{display:flex;align-items:center;justify-content:center;gap:2px;font-size:.68rem;font-weight:700;margin:1px 0;padding:1px 3px;border-radius:3px}
.fday .precip-row.snow{background:rgba(105,165,255,.15);color:#91bfff}
.fday .precip-row.rain{background:rgba(0,166,0,.15);color:#57d957}
.fday .precip-row.ice{background:rgba(255,105,180,.15);color:#ff8ec4}
.fday .precip-row.none{color:#393f47}
.fday .tag{font-size:.5rem;text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.tag-past{color:#8b949e}.tag-today{color:#3fb950}.tag-fcast{color:#58a6ff}
.loading-strip{display:flex;align-items:center;justify-content:center;padding:18px;border-top:1px solid #30363d;color:#484f58;font-size:.78rem;gap:8px}
.loading-strip .spinner{width:14px;height:14px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-strip{padding:12px;text-align:center;border-top:1px solid #30363d;color:#f85149;font-size:.75rem}
footer{text-align:center;padding:28px;color:#484f58;font-size:.78rem;border-top:1px solid #21262d}
footer a{color:#58a6ff;text-decoration:none}
</style>

const STATES = [...new Set(MOUNTAINS.map(m => m.state))];
let activeFilter = "ALL";
let refreshMs = 300000;
let refreshIntervalId = null;

// --- Controls ---
function buildControls() {
  const c = document.getElementById("controls");
  ["ALL", ...STATES].forEach(s => {
    const b = document.createElement("button");
    b.className = "filter-btn" + (s === "ALL" ? " active" : "");
    b.textContent = s;
    b.dataset.filter = s;
    if (s !== "ALL") b.classList.add(s);
    b.onclick = () => {
      activeFilter = s;
      document.querySelectorAll(".filter-btn").forEach(x => x.classList.toggle("active", x.dataset.filter === s));
      document.querySelectorAll(".card").forEach(card => {
        card.style.display = (s === "ALL" || card.dataset.state === s) ? "" : "none";
      });
    };
    c.appendChild(b);
  });
}

function bustUrl(url) {
  const sep = url.includes("?") ? "&" : "?";
  return url + sep + "_=" + Date.now();
}
function formatTime(ms) {
  return new Date(ms).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// --- Build Cards ---
function buildGrid() {
  const grid = document.getElementById("grid");
  MOUNTAINS.forEach((m, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.state = m.state;
    card.dataset.index = i;

    // Header
    const head = document.createElement("div");
    head.className = "card-head";
    const providerHtml = m.provider ? `<span class="provider">${m.provider}</span>` : "";
    head.innerHTML = `<h3>${esc(m.name)}</h3><div class="meta"><span class="badge ${m.state}">${m.state}</span>${providerHtml}</div>`;

    // Feed area
    const feed = document.createElement("div");
    feed.className = "cam-feed";

    if (m.type === "iframe") {
      const iframe = document.createElement("iframe");
      iframe.src = m.url;
      iframe.title = m.name;
      iframe.loading = "lazy";
      iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture");
      iframe.allowFullscreen = true;
      feed.appendChild(iframe);
    } else if (m.type === "image" && m.url) {
      const img = document.createElement("img");
      img.alt = m.name;
      img.loading = "lazy";
      img.src = bustUrl(m.url);
      img.dataset.originalUrl = m.url;
      img.onerror = function() {
        const ph = document.createElement("div");
        ph.className = "placeholder error";
        ph.innerHTML = `Webcam unavailable<a href="${esc(m.webcamPage)}" target="_blank" rel="noopener">View on resort site</a>`;
        feed.appendChild(ph);
        img.remove();
      };
      img.onload = function() {
        const upd = card.querySelector(".cam-updated");
        if (upd) upd.textContent = "Updated " + formatTime(Date.now());
      };
      feed.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "placeholder";
      ph.innerHTML = `<span>No direct feed available</span><a href="${esc(m.webcamPage)}" target="_blank" rel="noopener">Open resort webcam page</a>`;
      feed.appendChild(ph);
    }

    // Temperature overlay (populated later)
    const tempOv = document.createElement("div");
    tempOv.className = "temp-overlay";
    tempOv.id = "temps-" + i;
    tempOv.style.display = "none";
    feed.appendChild(tempOv);

    // Updated timestamp (for image feeds)
    let updatedDiv = null;
    if (m.type === "image" && m.url) {
      updatedDiv = document.createElement("div");
      updatedDiv.className = "cam-updated";
      updatedDiv.textContent = "Loading...";
    }

    // Forecast placeholder
    const forecastDiv = document.createElement("div");
    forecastDiv.className = "loading-strip";
    forecastDiv.id = "forecast-" + i;
    forecastDiv.innerHTML = '<div class="spinner"></div>Loading forecast...';

    card.appendChild(head);
    card.appendChild(feed);
    if (updatedDiv) card.appendChild(updatedDiv);
    card.appendChild(forecastDiv);
    grid.appendChild(card);
  });
}

// --- Image Refresh ---
function refreshAllImages() {
  document.querySelectorAll(".cam-feed img").forEach(img => {
    if (img.dataset.originalUrl) img.src = bustUrl(img.dataset.originalUrl);
  });
}
function startRefreshInterval() {
  if (refreshIntervalId) clearInterval(refreshIntervalId);
  refreshIntervalId = setInterval(refreshAllImages, refreshMs);
}
document.getElementById("refreshInterval").addEventListener("change", function() {
  refreshMs = parseInt(this.value, 10);
  startRefreshInterval();
});
document.getElementById("refreshNow").addEventListener("click", refreshAllImages);

// --- Weather API ---
// Fetch daily forecast: snow, rain, precip total, hi/lo temps + current base temp
async function fetchForecast(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&daily=snowfall_sum,rain_sum,precipitation_sum,temperature_2m_max,temperature_2m_min`
    + `&current=temperature_2m`
    + `&past_days=3&forecast_days=4&timezone=America%2FNew_York&temperature_unit=fahrenheit`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  return resp.json();
}

// Fetch current temp at a specific elevation (for summit)
async function fetchSummitTemp(lat, lon, elevation) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
    + `&current=temperature_2m&timezone=America%2FNew_York&temperature_unit=fahrenheit`
    + `&elevation=${elevation}`;
  const resp = await fetch(url);
  if (!resp.ok) return null;
  const data = await resp.json();
  return data.current ? Math.round(data.current.temperature_2m) : null;
}

// Convert units: snowfall cm→in, rain/precip mm→in
function cmToIn(cm) { return cm != null ? cm / 2.54 : 0; }
function mmToIn(mm) { return mm != null ? mm / 25.4 : 0; }

function renderForecast(index, data) {
  const el = document.getElementById("forecast-" + index);
  const daily = data.daily;
  const today = new Date().toISOString().slice(0, 10);
  const todayIdx = daily.time.indexOf(today);
  let html = "";

  daily.time.forEach((date, i) => {
    const snowIn = cmToIn(daily.snowfall_sum[i]);
    const rainIn = mmToIn(daily.rain_sum[i]);
    const precipIn = mmToIn(daily.precipitation_sum[i]);
    // Ice/mix = total precip minus rain minus snow liquid equivalent (snow SWE ~10:1 ratio)
    const snowLiquidIn = snowIn / 10;
    let iceIn = precipIn - rainIn - snowLiquidIn;
    if (iceIn < 0.01) iceIn = 0;

    const hi = daily.temperature_2m_max[i] != null ? Math.round(daily.temperature_2m_max[i]) : "--";
    const lo = daily.temperature_2m_min[i] != null ? Math.round(daily.temperature_2m_min[i]) : "--";
    const isToday = date === today;
    const isPast = i < todayIdx;
    const d = new Date(date + "T12:00:00");
    const dayStr = d.toLocaleDateString("en-US", { weekday: "short" });
    const dateStr = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const tagCls = isToday ? "tag-today" : isPast ? "tag-past" : "tag-fcast";
    const tagLabel = isToday ? "Today" : isPast ? "Past" : "Fcst";

    // Build precip rows — only show types with > 0.0"
    let precipHtml = "";
    if (snowIn >= 0.05) {
      precipHtml += `<div class="precip-row snow">&#10052; ${snowIn.toFixed(1)}"</div>`;
    }
    if (rainIn >= 0.005) {
      precipHtml += `<div class="precip-row rain">&#9679; ${rainIn.toFixed(2)}"</div>`;
    }
    if (iceIn >= 0.005) {
      precipHtml += `<div class="precip-row ice">&#9830; ${iceIn.toFixed(2)}"</div>`;
    }
    if (!precipHtml) {
      precipHtml = `<div class="precip-row none">&mdash;</div>`;
    }

    html += `<div class="fday ${isToday ? "today" : ""}">
      <div class="dt">${dayStr}<br>${dateStr}</div>
      <div class="temps"><span class="hi">${hi}°</span> / <span class="lo">${lo}°</span></div>
      ${precipHtml}
      <div class="tag ${tagCls}">${tagLabel}</div>
    </div>`;
  });

  el.className = "forecast-strip";
  el.innerHTML = html;
}

function renderTempOverlay(index, baseTemp, summitTemp) {
  const el = document.getElementById("temps-" + index);
  if (!el) return;
  const bStr = baseTemp != null ? Math.round(baseTemp) + "°F" : "--";
  const sStr = summitTemp != null ? summitTemp + "°F" : "--";
  el.innerHTML = `<div class="temp-pill base"><span class="lbl">Base</span><span class="deg">${bStr}</span></div>`
    + `<div class="temp-pill summit"><span class="lbl">Summit</span><span class="deg">${sStr}</span></div>`;
  el.style.display = "";
}

function renderError(index, msg) {
  const el = document.getElementById("forecast-" + index);
  el.className = "error-strip";
  el.textContent = "Forecast unavailable: " + msg;
}

async function loadAllForecasts() {
  const seenForecast = new Map();
  const seenSummit = new Map();

  for (let i = 0; i < MOUNTAINS.length; i++) {
    const m = MOUNTAINS[i];
    const fKey = m.lat + "," + m.lon;
    const sKey = fKey + "," + m.summitElev;

    try {
      // Forecast + base current temp (dedup by lat/lon)
      let data;
      if (seenForecast.has(fKey)) {
        data = seenForecast.get(fKey);
      } else {
        data = await fetchForecast(m.lat, m.lon);
        seenForecast.set(fKey, data);
        await new Promise(r => setTimeout(r, 80));
      }
      renderForecast(i, data);

      // Current temps overlay
      const baseTemp = data.current ? data.current.temperature_2m : null;
      let summitTemp;
      if (seenSummit.has(sKey)) {
        summitTemp = seenSummit.get(sKey);
      } else {
        summitTemp = await fetchSummitTemp(m.lat, m.lon, m.summitElev);
        seenSummit.set(sKey, summitTemp);
        await new Promise(r => setTimeout(r, 80));
      }
      renderTempOverlay(i, baseTemp, summitTemp);

    } catch (e) {
      renderError(i, e.message);
    }
  }
  document.getElementById("updated").textContent =
    "Loaded: " + new Date().toLocaleString("en-US", { timeZone: "America/New_York" }) + " ET";
}

// --- Init ---
buildControls();
buildGrid();
loadAllForecasts();
startRefreshInterval();
</script>
